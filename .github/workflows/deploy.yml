name: Validate changed stacks

on:
  push:
    branches: [main]
    paths:
      - 'stacks/**'
  pull_request:
    paths:
      - 'stacks/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect and validate changed stacks
        run: |
          if git rev-parse --verify HEAD~1 > /dev/null 2>&1; then
            changed=$(git diff --name-only HEAD~1 HEAD -- stacks/ \
              | cut -d/ -f2 | sort -u)
          else
            changed=$(git ls-tree --name-only HEAD -- stacks/ | sort -u)
          fi

          if [ -z "$changed" ]; then
            echo "No stack folders changed, skipping."
            exit 0
          fi

          failed=0
          for stack in $changed; do
            compose="stacks/$stack/docker-compose.yml"
            if [ ! -f "$compose" ]; then
              echo "WARNING: $compose not found — skipping"
              continue
            fi
            echo "Validating $compose"
            if ! docker compose -f "$compose" config --quiet 2>&1; then
              echo "ERROR: $compose failed validation"
              failed=1
            else
              echo "$stack OK"
            fi
          done
          exit ${failed:-0}

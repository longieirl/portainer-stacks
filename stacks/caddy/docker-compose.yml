services:
  caddy:
    image: slothcroissant/caddy-cloudflaredns:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_DATA_HOME}/caddy_data:/data
      - ${DOCKER_DATA_HOME}/caddy_config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - proxy_net
      - remote-access
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 256m
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0
    container_name: cloudflared-caddy
    restart: unless-stopped
    # --metrics localhost:7834 restricts Prometheus metrics to loopback only
    command: tunnel --no-autoupdate --metrics localhost:7834 run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - proxy_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m

configs:
  caddyfile:
    content: |
      {
          acme_dns cloudflare {env.CLOUDFLARE_API_TOKEN}
          auto_https disable_redirects
          servers {
              trusted_proxies static private_ranges
          }
      }

      # http:// blocks handle tunnel traffic (cloudflared → http://caddy:80).
      http://portainer.longie.net {
          reverse_proxy 192.168.1.6:9443 {
              header_up Host portainer.longie.net
              header_up Origin https://portainer.longie.net
              transport http {
                  tls_insecure_skip_verify
              }
          }
      }

      http://sonarr.longie.net {
          reverse_proxy 192.168.1.6:8989
      }

      http://n8n.longie.net {
          reverse_proxy n8n:5678
      }

      http://plex.longie.net {
          reverse_proxy 192.168.1.6:32400
      }

      portainer.longie.net {
          reverse_proxy 192.168.1.6:9443 {
              header_up Host portainer.longie.net
              header_up Origin https://portainer.longie.net
              transport http {
                  tls_insecure_skip_verify
              }
          }
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      sonarr.longie.net {
          reverse_proxy 192.168.1.6:8989
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      jackett.longie.net {
          reverse_proxy 192.168.1.6:9117
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      qbt.longie.net {
          reverse_proxy 192.168.1.6:8080
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      deluge.longie.net {
          reverse_proxy 192.168.1.6:8112
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      # NOTE: Auth enforced by Cloudflare Access at edge. Caddy only routes.
      # Webhook bypass paths are configured in Access policies, not here.
      n8n.longie.net {
          reverse_proxy n8n:5678
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

      # NOTE: CF Access bypassed for plex.longie.net — Plex uses its own auth.
      plex.longie.net {
          reverse_proxy 192.168.1.6:32400
          header {
              Strict-Transport-Security "max-age=31536000; includeSubDomains"
              X-Frame-Options "SAMEORIGIN"
              X-Content-Type-Options "nosniff"
          }
      }

networks:
  proxy_net:
    name: proxy_net
    driver: bridge
  remote-access:
    name: remote-access
    external: true

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8989:8989"
    volumes:
      - ${DOCKER_DATA_HOME}/caddy_data:/data
      - ${DOCKER_DATA_HOME}/caddy_config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    networks:
      - proxy_net

configs:
  caddyfile:
    content: |
      http://192.168.1.6:80 {
          redir https://192.168.1.6{uri} permanent
      }

      https://192.168.1.6 {
          reverse_proxy n8n:5678
      }

      https://192.168.1.6:8080 {
          reverse_proxy gluetun:8080
      }

      https://192.168.1.6:8989 {
          reverse_proxy sonarr:8989
      }

networks:
  proxy_net:
    name: proxy_net
    driver: bridge

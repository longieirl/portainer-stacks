services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: unless-stopped
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Europe/Dublin
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=10.14.0.2/16
      - UPDATER_PERIOD=24h
      - VPN_SERVICE_PROVIDER=surfshark
      - SERVER_COUNTRIES=United States
      - SERVER_CITIES=New York
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
    volumes:
      - ${DOCKER_DATA_HOME}/gluetun:/gluetun
      - ${DOCKER_DATA_HOME}/port_forward:/tmp/gluetun/forwarded_port
    ports:
      - 127.0.0.1:3020:8000/tcp   # Built-in HTTP control server — LAN only via Caddy
      - 127.0.0.1:8080:8080       # QB WebUI — LAN only via Caddy
      - 127.0.0.1:8999:8999       # QB torrenting port
      - 127.0.0.1:49153:49152     # Deluge (49152 reserved by macOS rapportd)
      - 127.0.0.1:49153:49152/udp # Deluge
      - 127.0.0.1:8112:8112       # Deluge WebUI — LAN only via Caddy
      - 127.0.0.1:6881:6881       # QB
      - 127.0.0.1:6881:6881/udp   # QB
      - 127.0.0.1:9117:9117       # Jackett — LAN only via Caddy
      - 127.0.0.1:58846:58846     # Deluge daemon
    mem_limit: 256m

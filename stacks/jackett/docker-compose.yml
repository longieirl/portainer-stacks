services:
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    network_mode: "container:gluetun"
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
      - AUTO_UPDATE=false #optional — Watchtower handles updates
    volumes:
      - ${DOCKER_DATA_HOME}/jackett/config:/config
      - ${DOCKER_SHARED_HOME}/downloads:/downloads
    # ports:
    #   - 9117:9117
    restart: unless-stopped

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
      - UMASK=022
      - WEBUI_PORT=8080
      - TORRENTING_PORT=8999
      - DOCKER_MODS=ghcr.io/gilbn/theme.park:qbittorrent
      - TP_THEME=space-gray
    volumes:
      - ${DOCKER_DATA_HOME}/torrent/config:/config
      - ${DOCKER_DATA_HOME}/torrent/downloads:/downloads
    restart: unless-stopped

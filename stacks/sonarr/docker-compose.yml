services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
    volumes:
      - ${DOCKER_DATA_HOME}/sonarr/config:/config
      - ${DOCKER_SHARED_HOME}/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

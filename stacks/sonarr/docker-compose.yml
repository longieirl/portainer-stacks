services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
    volumes:
      - ${HOME}/Documents/docker/data/sonarr/config:/config
      - ${HOME}/Documents/docker/shared/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
